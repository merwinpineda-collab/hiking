<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Add Walk-in Booking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root { --accent:#2e7d32; --accent-light:#a5d6a7; }
   body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                  url('../bggg.avif') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
      padding-bottom: 40px;
      color: #33691e;
    }

    /* Navbar */
    nav {
      background-color: var(--accent) !important;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      border-radius: 0 0 12px 12px;
    }

    nav a.nav-link,
    nav .navbar-brand {
      color: #e8f5e9 !important;
      font-weight: 500;
    }

    nav a.nav-link:hover,
    nav a.nav-link.active {
      color: var(--accent-light) !important;
    }

    nav .navbar-brand i {
      color: #c5e1a5;
    }

    .dropdown-menu {
      background: rgba(46, 125, 50, 0.95);
      border: none;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    .dropdown-item {
      color: #e8f5e9 !important;
      font-weight: 500;
      border-radius: 8px;
      margin: 2px 8px;
      width: auto;
    }
    .dropdown-item:hover, .dropdown-item:focus {
      background: rgba(255,255,255,0.15);
      color: #fff !important;
    }
    .dropdown-divider {
      border-color: rgba(255,255,255,0.2);
      margin: 4px 12px;
    }

    /* Hero */
    .hero {
      background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #f1f8e9;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.6);
      font-weight: 700;
      font-size: 3rem;
      margin: 0 1rem;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(46, 125, 50, 0.4);
    }

    /* Content Section */
    .content-section {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      padding: 40px 30px;
      margin-top: -60px;
      position: relative;
      z-index: 2;
    }

    h3.card-title {
      color: var(--accent);
      font-weight: 600;
    }

    .table th {
      background-color: var(--accent-light);
      color: #1b5e20;
    }

    .table-striped tbody tr:nth-of-type(odd) {
      background-color: #f1f8f6;
    }

    .btn-cancel {
      background-color: #d32f2f;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
    }

    .btn-cancel:hover {
      background-color: #b71c1c;
    }

    .btn-view {
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
    }

    .btn-view:hover {
      background-color: #1b5e20;
    }

    footer {
      background: rgba(46,125,50,0.9);
      color: #dcedc8;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      margin-top: auto;
    }

    @media (max-width: 576px) {
      .hero {
        font-size: 2rem;
        height: 220px;
      }

      .content-section {
        padding: 25px 20px;
      }
    }
    main{ max-width:980px; margin:auto; padding:20px; }
    .card{ background: rgba(255,255,255,.97); color:#1b5e20; border-radius:18px; box-shadow:0 10px 40px rgba(0,0,0,.15); }
    .card-header{ background: transparent; border-bottom:1px solid rgba(0,0,0,.08); }
    .btn-accent{ background: var(--accent); border: none; }
    .btn-accent:hover{ background:#1b5e20; }
    .form-label{ font-weight:600; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="admindashboard.html"><i class="bi bi-tree-fill me-2"></i>WilderPath Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="admindashboard.html">Homepage</a></li>
          <li class="nav-item"><a class="nav-link" href="adminbooking.html">Booking Info</a></li>
          <li class="nav-item"><a class="nav-link" href="adminreservation.html">Reservations</a></li>
          <li class="nav-item"><a class="nav-link" href="adminguides.html">Manage Guides</a></li>
          <li class="nav-item"><a class="nav-link active" href="adminwalkin.html">Walk-in</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <div class="card border-0">
      <div class="card-header py-4">
        <h3 class="mb-0"><i class="bi bi-person-walking me-2"></i>Add Walk-in Booking</h3>
      </div>
      <div class="card-body p-4">

        <div id="messageBox" class="alert d-none" role="alert"></div>

        <form id="walkinForm" onsubmit="submitWalkin(event)">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="full_name">Full Name *</label>
              <input type="text" class="form-control" id="full_name" name="full_name" required />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="contact_number">Contact Number *</label>
              <input type="text" class="form-control" id="contact_number" name="contact_number" required />
            </div>

            <div class="col-md-6">
              <label class="form-label" for="email">Email</label>
              <input type="email" class="form-control" id="email" name="email" />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="booking_date">Booking Date *</label>
              <input type="date" class="form-control" id="booking_date" name="booking_date" required />
            </div>

            <div class="col-md-6">
              <label class="form-label" for="time_slot">Time Slot *</label>
              <input type="text" class="form-control" id="time_slot" name="time_slot" placeholder="e.g., 7:00 AM - 8:00 AM" required />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="number_of_guests">Number of Guests *</label>
              <input type="number" min="1" class="form-control" id="number_of_guests" name="number_of_guests" value="1" required />
            </div>

            <div class="col-md-6">
              <label class="form-label" for="service_name">Service Name</label>
              <input type="text" class="form-control" id="service_name" name="service_name" placeholder="Optional" />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="amount_paid">Amount Paid (₱100 per head)</label>
              <input type="text" class="form-control" id="amount_paid_display" name="amount_paid_display" value="₱100.00" readonly />
              <input type="number" step="0.01" min="0" class="form-control d-none" id="amount_paid" name="amount_paid" value="100" readonly />
            </div>


            <div class="col-md-12">
              <label class="form-label" for="notes">Notes</label>
              <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Optional"></textarea>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-accent text-white"><i class="bi bi-plus-circle me-2"></i>Add Walk-in</button>
            <button type="reset" class="btn btn-outline-secondary" onclick="clearMsg()">Reset</button>
          </div>
        </form>

      </div>
    </div>
  </main>

  <footer class="text-center text-white mt-4" style="opacity:.95">
    <div>© <span id="year"></span> WilderPath Admin</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/jquery.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function showMsg(type, msg) {
      const box = document.getElementById('messageBox');
      box.classList.remove('d-none');
      box.classList.remove('alert-success','alert-danger','alert-warning');
      if (type === 'success') box.classList.add('alert-success');
      if (type === 'error') box.classList.add('alert-danger');
      if (type === 'warning') box.classList.add('alert-warning');
      box.textContent = msg;
    }

    function clearMsg(){
      const box = document.getElementById('messageBox');
      box.classList.add('d-none');
      box.textContent = '';
    }

    function recalcAmountPaid() {
      const guestsEl = document.getElementById('number_of_guests');
      const displayEl = document.getElementById('amount_paid_display');
      const amountEl = document.getElementById('amount_paid');

      const guests = parseInt(guestsEl.value || '0', 10);
      const safeGuests = isNaN(guests) || guests < 1 ? 1 : guests;

      const amount = safeGuests * 100;
      displayEl.value = '₱' + amount.toFixed(2);
      amountEl.value = amount;
    }


    // Recalculate whenever guests changes
    document.addEventListener('DOMContentLoaded', () => {
      const guestsEl = document.getElementById('number_of_guests');
      recalcAmountPaid();
      guestsEl.addEventListener('input', recalcAmountPaid);
      guestsEl.addEventListener('change', recalcAmountPaid);
    });

    function submitWalkin(e) {
      e.preventDefault();
      clearMsg();

      const form = document.getElementById('walkinForm');
      const data = new FormData(form);

      $.ajax({
        url: '../php/walkinbooking.php',
        type: 'POST',
        data: data,
        processData: false,
        contentType: false,
        dataType: 'json',
        success: function(res) {
          if (res && res.status === 'success') {
            showMsg('success', res.message);
            form.reset();
            recalcAmountPaid();
          } else {
            showMsg('error', (res && res.message) ? res.message : 'Failed to add walk-in booking.');
          }
        },
        error: function(xhr) {
          showMsg('error', 'Server error while adding walk-in booking.');
          console.error(xhr.responseText);
        }
      });
    }

  </script>
</body>
</html>
