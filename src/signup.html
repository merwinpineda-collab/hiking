<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WilderPath - Registration</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                  url('../bggg.avif');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .registration-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      max-width: 540px;
      width: 100%;
    }

    .form-title {
      text-align: center;
      margin-bottom: 1.8rem;
      color: #2e7d32;
      font-weight: 700;
      font-size: 1.9rem;
    }

    label {
      font-weight: 500;
      color: #33691e;
    }

    input, select {
      border-radius: 8px;
      border: 1px solid #ccc;
      padding: 0.6rem 0.75rem;
    }

    input:focus, select:focus {
      border-color: #81c784;
      box-shadow: 0 0 0 0.15rem rgba(129, 199, 132, 0.25);
    }

    .btn-primary {
      background: linear-gradient(135deg, #66bb6a, #388e3c);
      border: none;
      font-weight: 600;
      padding: 0.75rem;
      border-radius: 8px;
      transition: background 0.3s, transform 0.2s;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #43a047, #2e7d32);
      transform: translateY(-1px);
    }

    .text-center a {
      color: #2e7d32;
      text-decoration: none;
      font-weight: 500;
    }

    .text-center a:hover {
      text-decoration: underline;
    }

    #messageBox {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      display: none;
      font-weight: 500;
    }

    #messageBox.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    #messageBox.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    @media (max-width: 576px) {
      .registration-container {
        padding: 1.8rem;
      }
    }
  </style>
</head>
<body>

  <div class="registration-container">
    <h2 class="form-title">Join WilderPath</h2>
    <form class="row g-3" onsubmit="volunteerRegistration(event)">
      <div class="col-md-6">
        <label for="txtFirstName" class="form-label">First Name</label>
        <input type="text" class="form-control" id="txtFirstName" required>
      </div>
      <div class="col-md-6">
        <label for="txtMiddleName" class="form-label">Middle Name</label>
        <input type="text" class="form-control" id="txtMiddleName">
      </div>
      <div class="col-md-6">
        <label for="txtLastName" class="form-label">Last Name</label>
        <input type="text" class="form-control" id="txtLastName" required>
      </div>
      <div class="col-md-6">
        <label for="txtGender" class="form-label">Gender</label>
        <select class="form-control" id="txtGender" required>
          <option value="" disabled selected>Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="col-md-6">
        <label for="txtAge" class="form-label">Age</label>
        <input type="number" class="form-control" id="txtAge" required>
      </div>
      <div class="col-md-6">
        <label for="txtNumber" class="form-label">Contact Number</label>
        <input type="text" class="form-control" id="txtNumber" required>
      </div>
      <div class="col-12">
        <label for="txtEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="txtEmail" required>
      </div>
      <div class="col-12">
        <label for="txtPassword" class="form-label">Password</label>
        <input type="password" class="form-control" id="txtPassword" required>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary w-100">Sign Up</button>
      </div>
      <div class="col-12 text-center mt-2">
        <p class="mb-0">Already have an account? <a href="login.html">Sign in here</a></p>
      </div>
    </form>
    <div id="messageBox"></div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.min.js"></script>
  <script src="../js/jquery.js"></script>
  <script src="index.js"></script>
</body>
</html>
